# Production compose — BUKAN buat development (dev pakai compose.yaml / Sail).
# Jalankan: docker compose -f compose.prod.yaml up -d --build
services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            target: production
        image: kerjasama-app:latest
        restart: unless-stopped
        ports:
            - '${APP_PORT:-80}:8080'
        env_file: .env
        environment:
            # Otomatis saat container start: migrate --force, storage:link,
            # config:cache, route:cache, view:cache, event:cache
            AUTORUN_ENABLED: 'true'
            HEALTHCHECK_PATH: '/up'
        volumes:
            - 'app-storage:/var/www/html/storage/app'
        depends_on:
            pgsql:
                condition: service_healthy
        networks:
            - kerjasama

    queue:
        image: kerjasama-app:latest
        restart: unless-stopped
        command: ['php', '/var/www/html/artisan', 'queue:work', '--tries=3', '--max-time=3600']
        stop_signal: SIGTERM
        env_file: .env
        volumes:
            - 'app-storage:/var/www/html/storage/app'
        depends_on:
            pgsql:
                condition: service_healthy
        healthcheck:
            test: ['CMD', 'healthcheck-queue']
            start_period: 10s
        networks:
            - kerjasama

    scheduler:
        image: kerjasama-app:latest
        restart: unless-stopped
        command: ['php', '/var/www/html/artisan', 'schedule:work']
        stop_signal: SIGTERM
        env_file: .env
        volumes:
            - 'app-storage:/var/www/html/storage/app'
        depends_on:
            pgsql:
                condition: service_healthy
        healthcheck:
            test: ['CMD', 'healthcheck-schedule']
            start_period: 10s
        networks:
            - kerjasama

    pgsql:
        image: 'postgres:16-alpine'
        restart: unless-stopped
        environment:
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - 'pgsql-data:/var/lib/postgresql/data'
        healthcheck:
            test: ['CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE}', '-U', '${DB_USERNAME}']
            interval: 10s
            retries: 5
            timeout: 5s
        networks:
            - kerjasama

networks:
    kerjasama:
        driver: bridge

volumes:
    app-storage:
        driver: local
    pgsql-data:
        driver: local
